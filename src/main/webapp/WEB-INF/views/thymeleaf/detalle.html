<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle del Producto</title>
    <link rel="stylesheet" th:href="@{/css/productos.css}"/>
</head>
<body>
<div class="container">
    <div class="card">
        <h1 th:text="${producto.nombre}"></h1>
        <div class="info">
            <span class="label">Descripción</span>
            <span class="valor" th:text="${producto.descripcion}"></span>
        </div>
        <div class="info">
            <span class="label">Precio</span>
            <span class="valor" th:text="${'$' + producto.precio}"></span>
        </div>
        <a href="/spring/productos">← Volver a productos</a>
    </div>
</div>
</body>
</html>
